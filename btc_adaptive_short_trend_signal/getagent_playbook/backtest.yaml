venue:
  name: BINANCE
  account_type: MARGIN
  oms_type: NETTING
  starting_balances:
    - amount: 100000
      currency: USDT

strategy:
  module: strategy
  class: AdaptiveShortTrendStrategy
  config_class: AdaptiveShortTrendStrategyConfig
  config:
    order_id_tag: "001"
    trade_size: "0.001"
    fast_window: 6
    mid_window: 18
    slow_window: 60
    long_window: 126
    vol_window: 30
    bear_on: 0.48
    bear_off: 0.30
    ret_slow_max: 0.02
    ret_mid_max: 0.01
    ret_mid_exit: 0.04
    short_sma_mult: 1.01
    mid_sma_mult: 1.005
    rebound_ret_max: 0.055
    rebound_sma_mult: 1.015
    exit_sma_mult: 1.025
    vol_ceiling: 0.45
    min_hold_bars: 3
    max_hold_bars: 18

instrument:
  id: BTCUSDT.BINANCE
  kind: perpetual
  raw_symbol: BTCUSDT
  base_currency: BTC
  quote_currency: USDT
  settlement_currency: USDT
  price_precision: 2
  size_precision: 3
  price_increment: "0.01"
  size_increment: "0.001"
  lot_size: "0.001"
  maker_fee: "0.0002"
  taker_fee: "0.0005"
  bar_type: BTCUSDT.BINANCE-4-HOUR-LAST-EXTERNAL
