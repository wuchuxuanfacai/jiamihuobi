name: btc-adaptive-short-trend-signal
display_name: "BTC Adaptive Short Trend Signal"
version: "0.1.0"
description: "BTCUSDT perpetual short-or-flat strategy using adaptive bearish regime and volatility-aware target sizing"
long_description: |
  This Playbook is a BTC perpetual futures strategy designed to capture sustained bearish regimes while staying flat when the downside setup is weak. The thesis is that BTC selloffs often appear in two different forms: cleaner lower-volatility downtrends where larger short exposure can be justified, and more violent bearish regimes where smaller participation is preferable to either full-size exposure or complete inactivity. The approach is intentionally short-or-flat and does not attempt to buy rebounds.

  Entry decisions are based on bearish price structure, medium-term momentum, longer-cycle price location, rebound behavior, and realized volatility. When the market shows clear downside alignment and volatility remains controlled, the strategy opens or increases a short position through the primary branch. When volatility is higher but bearish structure is still valid, a secondary branch can enter short with reduced exposure. The Playbook acts as a target-position system rather than a fixed-size entry signal.

  Exits happen through target-weight reduction. The strategy closes or reduces a short position when bearish alignment fades, rebound pressure damages the setup, volatility moves outside the intended regime, or the calculated target becomes too small to justify another rebalance. It does not stack unmanaged shorts. Opposite or neutral readings move the target back toward flat, and small changes are ignored unless they clear the minimum useful adjustment size.

  Subscribers can tune leverage, margin budget, signal aggressiveness, maximum signal weight, effective exposure cap, maximum short weight, lookback sensitivity, short floor sizing, and volatility filters. Higher leverage and higher exposure caps amplify both gains and drawdowns. A larger margin budget increases the capital base used for sizing and return interpretation. More aggressive settings make the strategy respond earlier, while more defensive settings wait for cleaner confirmation.

  The main risks are sharp BTC rebounds, news gaps, choppy markets that briefly look bearish and then reverse, funding-rate shifts, liquidity changes, slippage, and live execution costs that exceed replay assumptions. The strategy can underperform or lose money during persistent rallies or noisy sideways markets. Historical Cloud backtest results are useful evidence, but they are not a guarantee of live profitability.
market_type: contract
trading_symbols: ["BTCUSDT"]
tags: ["btc", "contract", "short", "trend", "adaptive"]
