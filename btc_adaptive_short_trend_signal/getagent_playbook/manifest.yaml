name: btc-adaptive-short-trend-signal
display_name: "BTC Adaptive Short Trend Signal"
version: "0.1.0"
description: "BTC contract signal using a volatility-scaled short trend floor with rebound filters"
long_description: |
  This Playbook is an adaptive BTC perpetual futures signal designed to capture sustained downside trend behavior while staying out of unclear ranges. Its thesis is that after BTC enters a persistent weak structure, price often continues to travel lower before the trend fully resolves. The model is therefore defensive by default: it looks for clean bearish alignment, scales exposure by recent volatility, and keeps a hard short-or-flat posture instead of adding recovery longs. It aims to participate in directional bear phases without constantly fading every small bounce.

  Entry decisions are based on price action, trend alignment, momentum persistence, recent volatility, and whether a rebound has already become strong enough to invalidate the short setup. The strategy opens short when several downside checks agree and price remains below its broader trend reference. It does not open long by default; when downside confirmation is absent, the Playbook emits a hold signal rather than forcing a trade.

  Exits work by withdrawal of regime confirmation. A short signal closes when bearish alignment fades, momentum stops confirming, price recovers into the trend reference, or volatility-adjusted sizing no longer justifies exposure. There is no default long entry path to close. The Playbook is compatible with managed follow-trade deployment, while historical validation uses a deterministic replay of the same price-regime logic.

  Subscribers can tune leverage, margin budget, signal aggressiveness, maximum signal weight, short exposure cap, and volatility scaling. Higher leverage amplifies both upside and drawdown without improving signal quality. Margin budget controls the capital base used for sizing and return interpretation. Raising aggressiveness makes the model act earlier, while lowering it makes signals more selective. Raising exposure caps allows larger signals in confirmed regimes; lowering them makes the strategy more defensive.

  The main risk is being caught in sharp rebounds, news gaps, and choppy ranges where downside signals appear briefly and then reverse. The strategy can underperform or lose money when BTC rallies persistently, when bearish momentum decays slowly, or when liquidity and slippage differ from historical assumptions. Historical local research is useful context, but it is not a guarantee of live profitability, and subscribers should expect drawdown and unsuitable market periods.
market_type: contract
trading_symbols: ["BTCUSDT"]
tags: ["btc", "contract", "trend", "short", "adaptive"]
schedule:
  cron: "10 */4 * * *"
  tz: "Asia/Shanghai"
decision_mode: deterministic
backtest_support: full
runtime_profile: deterministic
execution_mode: follow_trade
follow_trade_supported: true

