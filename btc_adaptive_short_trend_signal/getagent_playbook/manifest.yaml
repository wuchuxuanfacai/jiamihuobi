name: btc-adaptive-short-trend-signal
display_name: "BTC Adaptive Trend Range Signal"
version: "0.1.0"
description: "BTC contract strategy combining trend long, trend short, and range mean-reversion target weights"
long_description: |
  This Playbook is an adaptive BTC perpetual futures strategy designed to capture sustained trends and controlled range reversals. Its thesis is that BTC alternates between directional phases, where a base position can ride the broader move, and quieter channel phases, where extremes can be faded with smaller flexible exposure. The model combines separate long-trend, short-trend, and range mean-reversion components into one target weight, then scales exposure by recent volatility so that position size contracts when price action becomes unstable.

  Entry decisions are based on price action, trend alignment, momentum persistence, channel location, and recent volatility. The strategy opens long when upside alignment is strong enough to support a trend floor, or when a healthy trend has a short-term pullback or acceleration setup. It opens short when downside alignment is strong enough to support a short floor, or when a bearish structure shows a breakdown or rebound failure. In a neutral range, it can buy lower-channel weakness and short upper-channel strength.

  Exits work by withdrawal of regime confirmation and target-weight reduction. A long closes when upside alignment fades, a pullback no longer looks constructive, or volatility-adjusted sizing no longer justifies exposure. A short closes when bearish alignment fades, rebound pressure invalidates the setup, or the market leaves the lower-risk volatility zone. Range positions close when price moves away from the channel extreme or a clearer trend regime takes over, allowing the composite target to return toward flat.

  Subscribers can tune leverage, margin budget, signal aggressiveness, maximum signal weight, short exposure cap, long exposure cap, and volatility scaling. Higher leverage amplifies both upside and drawdown without improving signal quality. Margin budget controls the capital base used for sizing and return interpretation. Raising aggressiveness makes the model act earlier, while lowering it makes signals more selective. Raising exposure caps allows larger signals in confirmed regimes; lowering them makes the strategy more defensive.

  The main risk is being caught in sharp rebounds, news gaps, and choppy ranges where downside signals appear briefly and then reverse. The strategy can underperform or lose money when BTC rallies persistently, when bearish momentum decays slowly, or when liquidity and slippage differ from historical assumptions. Historical local research is useful context, but it is not a guarantee of live profitability, and subscribers should expect drawdown and unsuitable market periods.
