  leverage: 3
  margin_budget: "100"
  timeframe: "4h"
  history_days: 90
  aggressiveness: 1.0
  weight_scale: 1.4
  fast_trend_days: 1
  mid_trend_days: 3
  slow_trend_days: 10
  long_trend_days: 21
  vol_days: 5
  bear_on: 0.48
  bear_off: 0.30
  ret_slow_max: 0.02
  ret_mid_max: 0.01
  ret_mid_exit: 0.04
  short_sma_mult: 1.01
  mid_sma_mult: 1.005
  rebound_ret_max: 0.055
  rebound_sma_mult: 1.015
  exit_sma_mult: 1.025
  short_target_vol: 0.35
  short_floor_cap: 1.00
  short_base: 0.65
  short_conf: 0.55
  max_short_weight: 1.40
  max_signal_weight: 1.40
  trend_on: 0.68
  ret_slow_min: 0.0
  ret_mid_min: 0.0
  long_sma_mult: 1.02
  long_target_vol: 0.0
  long_floor_cap: 0.0
  max_long_weight: 0.0
  vol_ceiling: 0.45
  vol_floor_min: 0.20
  min_hold_bars: 3
  max_hold_bars: 18
  cloud_fetch_start: "2026-02-01T00:00:00Z"
  cloud_trade_start: "2026-03-01T00:00:00Z"
  cloud_fetch_end: "2026-06-01T00:00:00Z"
  trade_size: "0.001"

