name: btc-intraday-daily-opportunity-signal
display_name: "BTC Intraday Daily Opportunity Signal"
version: "0.1.0"
description: "BTC contract strategy combining a higher-timeframe trend core with a small intraday opportunity overlay"
long_description: |
  This Playbook trades BTC perpetual futures with a hybrid thesis. The core component tries to capture sustained directional moves when the broader structure points clearly to one side. A smaller intraday overlay looks for recurring opportunity after price stretches away from its short-term fair value, so the strategy can participate more often without turning the whole system into a noisy scalper. It can trade both long and short, but its largest exposure is reserved for cleaner trend conditions while the intraday layer is intentionally small.

  Entry decisions are split between the two layers. The trend core opens short when downside structure, weak momentum, and controlled volatility align. It opens long only when recovery behavior is strong enough to justify a defensive allocation. The intraday overlay becomes active only when the core trend position is flat or small, then looks for price action that has moved too far from local value and starts to mean-revert.

  Exits are handled through target-position changes. When trend quality fades, rebound behavior damages the short setup, or volatility becomes unattractive, the core target moves back toward flat. The overlay is time-limited and closes quickly if the short-term opportunity expires. Opposite signals reduce or reverse the target instead of stacking unmanaged positions.

  Subscribers can tune leverage, margin budget, overall exposure, trend aggressiveness, and overlay size. Higher leverage amplifies both gains and drawdowns. A larger margin budget increases the capital base used for sizing and displayed return. Raising overlay size increases trade frequency but also increases fee drag and whipsaw risk. Lowering exposure makes the system quieter and may miss daily opportunities.

  The main risks are rapid reversals, choppy markets that repeatedly trigger small overlay trades, news gaps, funding-rate changes, and execution costs that exceed replay assumptions. This strategy can underperform when BTC moves in a narrow but noisy range or when intraday mean reversion fails repeatedly. Historical backtest performance is not a guarantee of live profitability.
market_type: contract
trading_symbols: ["BTCUSDT"]
tags: ["btc", "contract", "intraday", "trend", "mean-reversion"]
schedule:
  cron: "*/15 * * * *"
  tz: "Asia/Shanghai"
decision_mode: deterministic
backtest_support: full
runtime_profile: deterministic
execution_mode: follow_trade
follow_trade_supported: true

