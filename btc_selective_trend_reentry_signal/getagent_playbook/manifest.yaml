name: btc-selective-trend-reentry-signal
display_name: "BTC Selective Trend Re-Entry Signal"
version: "0.1.0"
description: "BTC contract strategy focused on low-turnover trend re-entry and volatility-scaled target weights"
long_description: |
  This Playbook is a selective trend re-entry strategy for BTC perpetual futures. Its thesis is that BTC often alternates between sustained directional phases and noisy pauses, and that the best risk-adjusted opportunities come from re-entering only when the directional structure has already become clear. The strategy can trade both long and short, but it is deliberately more selective than a continuous exposure system. It aims to capture meaningful trend continuation while avoiding the fee drag and drawdown that can come from forcing trades during every quiet market period.

  Entry decisions are based on price action, trend alignment, momentum persistence, rebound behavior, and volatility regime. The strategy opens short when downside alignment and weak momentum are confirmed while rebound pressure remains contained. It opens long only when recovery alignment is clean enough to support a small defensive position. Range behavior is used as a filter and a limited re-entry context, not as a reason to keep trading continuously through every flat patch.

  Exits and stops work through target-weight reduction. When the directional read weakens, when a rebound damages the short setup, or when volatility makes sizing unattractive, the target moves back toward flat. Long exposure is also reduced when upside alignment fades. The strategy does not require every trade to win; it is designed to cut exposure when the setup quality decays and wait for the next cleaner re-entry.

  Subscribers can adjust leverage, margin budget, aggressiveness, exposure caps, and volatility controls. Higher leverage amplifies both gains and drawdowns without making the signal more accurate. A larger margin budget increases the capital base used for sizing and return interpretation. More aggressive settings can make the model act earlier, while more defensive settings reduce trade frequency and may miss some trends.

  The main risk is underperforming in sharp reversals, news-driven gaps, and choppy conditions where trend signals form and then quickly fail. The strategy can lose money when BTC rebounds strongly after bearish entries or when live execution costs exceed replay assumptions. Historical backtest performance is not a guarantee of live profitability, and users should match the strategy to their own risk tolerance.
market_type: contract
trading_symbols: ["BTCUSDT"]
tags: ["btc", "contract", "trend", "reentry", "adaptive"]
