name: btc-intraday-regime-rotation-signal
display_name: "BTC HTF Direction 15m Execution Signal"
version: "0.1.0"
description: "BTC contract strategy using a higher-timeframe trend model with 15-minute execution bars"
long_description: |
  This Playbook is a selective BTC perpetual futures strategy that uses intraday bars as the execution feed while making its main directional decision from a slower aggregated trend view. Its thesis is that BTC often produces the best risk-adjusted trades after a larger directional structure is already visible, while many short intraday fluctuations are too noisy after fees. The strategy can trade both long and short, but it is deliberately more willing to express downside trend exposure and only keeps small long exposure when recovery structure is clean.

  Entry decisions combine price action, trend alignment, momentum persistence, rebound behavior, channel location, and realized volatility. The strategy opens short when downside alignment and weak momentum are confirmed while rebound pressure remains contained. It opens long only when upside recovery alignment is strong enough to support a defensive allocation. A small range component may appear only when neither side dominates and volatility remains contained.

  Exits are driven by target-weight reduction rather than fixed prediction labels. When the directional read weakens, when a rebound damages the short setup, when upside alignment fades, or when volatility makes sizing unattractive, the target moves back toward flat. This makes the strategy step exposure down as regime quality decays instead of waiting for a full opposite signal.

  Subscribers can tune leverage, margin budget, aggressiveness, exposure caps, range exposure, and volatility controls. Higher leverage amplifies both gains and drawdowns without improving signal accuracy. A larger margin budget increases the capital base used for sizing and return interpretation. More aggressive settings can make the model act earlier, while more defensive settings reduce trade frequency and may miss some trends.

  The main risks are sharp reversals, news-driven gaps, choppy conditions where trend signals form and then quickly fail, and execution costs that exceed replay assumptions. The strategy can lose money when BTC rebounds strongly after bearish entries or when the market repeatedly changes direction without follow-through. Historical backtest performance is not a guarantee of live profitability.
market_type: contract
trading_symbols: ["BTCUSDT"]
tags: ["btc", "contract", "intraday", "trend", "reentry"]
schedule:
  cron: "*/15 * * * *"
  tz: "Asia/Shanghai"
decision_mode: deterministic
backtest_support: full
runtime_profile: deterministic
execution_mode: follow_trade
follow_trade_supported: true

