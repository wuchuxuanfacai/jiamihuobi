    type: array
    item_type: string
    default: ["BTCUSDT"]
    options: ["BTCUSDT"]
    aliases:
      btc: BTCUSDT
      bitcoin: BTCUSDT
    min_items: 1
    max_items: 1
    label: "Trading symbol"
  leverage:
    type: integer
    default: 3
    min: 1
    max: 10
    aliases:
      3x: 3
      5x: 5
      10x: 10
    label: "Leverage"
  margin_budget:
    type: string
    default: "50000"
    pattern: "^[0-9]+(\\.[0-9]+)?$"
    label: "Margin budget USDT"
  timeframe:
    type: string
    default: "15m"
    options: ["15m"]
    label: "Execution timeframe"
  weight_scale:
    type: number
    default: 2.00
    min: 0.5
    max: 2.0
    label: "Weight scale"
  max_effective_exposure:
    type: number
    default: 3.20
    min: 0.10
    max: 3.0
    label: "Max effective exposure"
  max_short_weight:
    type: number
    default: 0.85
    min: 0.0
    max: 2.0
    label: "Max short weight"
  max_long_weight:
    type: number
    default: 0.55
    min: 0.0
    max: 2.0
    label: "Max long weight"
  trend_on:
    type: number
    default: 0.72
    min: 0.3
    max: 1.0
