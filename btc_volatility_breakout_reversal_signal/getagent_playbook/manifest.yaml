name: btc-volatility-breakout-reversal-signal
display_name: "BTC Volatility Breakout Reversal Signal"
version: "0.1.0"
description: "BTC contract strategy combining volatility breakout, trend regime, and pullback reversal signals"
long_description: |
  This Playbook trades BTC perpetual futures with a regime-aware approach that captures two different behaviors: directional breakouts after price compresses and controlled pullbacks inside an existing trend. The thesis is that BTC alternates between quiet preparation phases and fast directional releases, while some of the best entries occur when price briefly moves against the larger trend before momentum resumes. The strategy is designed to trade both long and short, with risk scaled by volatility and exposure capped at the portfolio level.

  Entry decisions combine price action, moving trend structure, channel location, volatility behavior, and recent momentum. It can open long when upside structure is aligned and price confirms a breakout, or when a rising regime experiences a contained pullback. It can open short when downside structure is aligned and price confirms a breakdown, or when a falling regime experiences a contained rebound. The model avoids treating every intraday move as a signal; it waits for regime evidence and a clean trigger.

  Exits are handled through target position changes. When the breakout loses momentum, the larger trend weakens, volatility expands in a way that makes sizing unattractive, or the pullback no longer looks constructive, the strategy reduces exposure or returns to flat. It does not rely on a single fixed take profit or stop label; instead, the desired position is recalculated as market structure changes.

  Subscribers can tune leverage, margin budget, signal aggressiveness, exposure caps, volatility settings, and directional limits. Higher leverage amplifies both gains and drawdowns without improving signal quality. A larger margin budget increases the notional capital used for sizing and return interpretation. More aggressive settings may increase trade frequency and earlier entries, while more defensive settings reduce activity and can miss fast moves.

  The main risks are false breakouts, sudden news reversals, range-bound markets that repeatedly trigger and fail, and execution costs that exceed replay assumptions. The strategy can underperform when BTC chops without follow-through or when a strong trend reverses abruptly after entry. Historical backtest performance is not a guarantee of live profitability, and users should match the strategy to their own risk tolerance.
market_type: contract
trading_symbols: ["BTCUSDT"]
tags: ["btc", "contract", "breakout", "volatility", "reversal"]
schedule:
  cron: "*/15 * * * *"
  tz: "Asia/Shanghai"
decision_mode: deterministic
backtest_support: full
runtime_profile: deterministic
execution_mode: follow_trade
follow_trade_supported: true

