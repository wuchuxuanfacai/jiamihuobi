  leverage: 3
  margin_budget: "50000"
  timeframe: "15m"
  history_days: 180
  decision_interval_minutes: 240
  target_step_weight: 0.05
  max_effective_exposure: 3.20
  min_rebalance_qty_pct: 0.25
  squeeze_window: 96
  stretch_window: 32
  trend_window: 384
  vol_window: 96
  overheat_z: 1.65
  overheat_ret_min: 0.035
  near_high_mult: 0.995
  vol_ceiling: 0.95
  turn_fast_ret_max: -0.004
  fade_from_high_mult: 0.985
  vol_expansion_min: 1.08
  trend_block_ret: 0.22
  washout_z: 1.85
  washout_ret_max: 0.045
  near_low_mult: 1.005
  long_vol_ceiling: 0.90
  turn_fast_ret_min: 0.004
  bounce_from_low_mult: 1.015
  short_target_vol: 0.42
  long_target_vol: 0.18
  max_signal_weight: 1.00
  max_short_weight: 1.00
  max_long_weight: 0.12
  weight_scale: 2.00
  vol_floor_min: 0.20
  min_trade_size: "0.001"
  cloud_fetch_start: "2025-12-18T00:00:00Z"
  cloud_trade_start: "2025-12-18T00:00:00Z"
  cloud_fetch_end: "2026-06-01T00:00:00Z"

